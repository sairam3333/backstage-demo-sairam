name: Deploy Backstage to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: backstage-test-499007
  REGION: asia-south1
  REPOSITORY: backstage
  IMAGE_NAME: backstage-demo-sairam
  SERVICE_NAME: backstage-demo-sairam

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Compile TypeScript
        run: yarn tsc

      # Builds both frontend (app) and backend packages
      - name: Build All Packages
        run: yarn build:all

      # This produces skeleton.tar.gz and bundle.tar.gz in packages/backend/dist
      # bundle.tar.gz will include the compiled frontend from the previous step
      - name: Package Backend
        run: yarn workspace backend build

      - name: Verify Bundle Contents
        run: |
          echo "=== dist folder contents ==="
          ls -la packages/backend/dist

          echo "=== bundle.tar.gz contents (first 100 entries) ==="
          tar -tzf packages/backend/dist/bundle.tar.gz | head -100

          echo "=== Checking frontend assets are present ==="
          tar -tzf packages/backend/dist/bundle.tar.gz | grep "static/" | head -20

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Authentication
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          docker build \
            -f packages/backend/Dockerfile \
            -t asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker Image
        run: |
          docker push asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --port=7007 \
            --set-env-vars="NODE_ENV=production" \
            --set-env-vars="APP_BASE_URL=https://backstage-demo-sairam-yfny4ac7bq-el.a.run.app" \
            --set-env-vars="POSTGRES_HOST=34.100.169.89" \
            --set-env-vars="POSTGRES_PORT=5432" \
            --set-env-vars="POSTGRES_USER=postgres" \
            --set-env-vars="POSTGRES_PASSWORD=postgres123" \
            --set-env-vars="POSTGRES_DATABASE=backstage" \
            --set-env-vars="AUTH_GITHUB_CLIENT_ID=Ov23liqlJ8REmzDjf4nV" \
            --set-env-vars="AUTH_GITHUB_CLIENT_SECRET=3597cc63442e4643f542dd23070c1cdec74e3c62" \
            --set-env-vars="AUTH_OKTA_CLIENT_ID=0oa13xyyfwp0dahuw698" \
            --set-env-vars="AUTH_OKTA_CLIENT_SECRET=xLceEDW6g8yHI7uDFrQCqon7a7GKhAmIrCuyxLU_KyHRFrWAX6Ve_gQgrIeVxXHo" \
            --set-env-vars="AUTH_OKTA_AUDIENCE=https://trial-7958725.okta.com" \
            --set-env-vars="GIT_TOKEN=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"

      - name: Get Cloud Run URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "✅ Backstage deployed at: $SERVICE_URL"
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV

      - name: Smoke Test Deployment
        run: |
          echo "Testing $SERVICE_URL/healthcheck"
          curl --fail --retry 5 --retry-delay 5 \
            "$SERVICE_URL/healthcheck" \
            && echo "✅ Health check passed" \
            || echo "⚠️  Health check failed — check Cloud Run logs"
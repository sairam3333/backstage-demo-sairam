name: Deploy Backstage to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: backstage-test-499007
  REGION: asia-south1
  REPOSITORY: backstage
  IMAGE_NAME: backstage-demo-sairam
  SERVICE_NAME: backstage-demo-sairam

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Compile TypeScript
        run: yarn tsc

      - name: Build All Packages
        run: yarn build:all

      # FIX: Updated to the modern Backstage CLI bundle command
      - name: Package Backend and Frontend Bundle
        run: yarn workspace backend backstage-cli backend:bundle

      - name: Verify Bundle Contents
        run: |
          ls -la packages/backend/dist
          tar -tzf packages/backend/dist/bundle.tar.gz | head -100

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Authentication
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          docker build \
            -f packages/backend/Dockerfile \
            -t asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Push Docker Image
        run: |
          docker push \
            asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # FIX: Explicitly passing the standard Cloud Run PORT to avoid configuration mismatches
      - name: Deploy to Cloud Run
        run: |
         gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --set-env-vars=NODE_ENV=production \
            --set-env-vars=PORT=8080 \
            --set-env-vars=APP_BASE_URL=${{ secrets.APP_BASE_URL }} \
            --set-env-vars=POSTGRES_HOST=${{ secrets.POSTGRES_HOST }} \
            --set-env-vars=POSTGRES_PORT=${{ secrets.POSTGRES_PORT }} \
            --set-env-vars=POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
            --set-env-vars=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --set-env-vars=POSTGRES_DATABASE=${{ secrets.POSTGRES_DATABASE }} \
            --set-env-vars=AUTH_GITHUB_CLIENT_ID=${{ secrets.AUTH_GITHUB_CLIENT_ID }} \
            --set-env-vars=AUTH_GITHUB_CLIENT_SECRET=${{ secrets.AUTH_GITHUB_CLIENT_SECRET }} \
            --set-env-vars=AUTH_OKTA_CLIENT_ID=${{ secrets.AUTH_OKTA_CLIENT_ID }} \
            --set-env-vars=AUTH_OKTA_CLIENT_SECRET=${{ secrets.AUTH_OKTA_CLIENT_SECRET }} \
            --set-env-vars=AUTH_OKTA_AUDIENCE=${{ secrets.AUTH_OKTA_AUDIENCE }}
      
      - name: Get Cloud Run URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)"
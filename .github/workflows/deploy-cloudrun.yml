name: Deploy Backstage to Cloud Run

on:
push:
branches:
- main

env:
PROJECT_ID: backstage-test-499007
REGION: asia-south1
REPOSITORY: backstage
IMAGE_NAME: backstage-demo-sairam
SERVICE_NAME: backstage-demo-sairam

jobs:
deploy:
runs-on: ubuntu-latest


permissions:
  contents: read
  id-token: write

steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Authenticate to GCP
    uses: google-github-actions/auth@v2
    with:
      credentials_json: '${{ secrets.GCP_SA_KEY }}'

  - name: Setup GCloud
    uses: google-github-actions/setup-gcloud@v2

  - name: Configure Docker
    run: |
      gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

  - name: Build Docker Image
    run: |
      docker build -t asia-south1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:${{ github.sha }} .

  - name: Push Docker Image
    run: |
      docker push asia-south1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:${{ github.sha }}

  - name: Deploy to Cloud Run
    run: |
      gcloud run deploy $SERVICE_NAME \
        --image asia-south1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:${{ github.sha }} \
        --platform managed \
        --region $REGION \
        --allow-unauthenticated \
        --port 7007

